kind = "api"
previewPath = "/ai"
title = "AI Service"
version = "1.0.0"
id = "ai-service"

[[services]]
localPort = 8000
name = "AI Service"
paths = ["/ai"]

[services.development]
run = "python main.py"

[services.production]

[services.production.run]
args = ["python", "main.py"]

[services.production.run.env]
PORT = "8000"

[services.production.health.startup]
path = "/ai/healthz"
