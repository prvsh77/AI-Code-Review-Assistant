services:
  - type: web_static
    name: AI-Code-Review-Assistant-2

    buildCommand: pnpm install && pnpm --filter @workspace/ai-code-review build
    publishPath: artifacts/ai-code-review/dist/public

    envVars:
      - key: VITE_API_URL
        value: https://ai-code-review-assistant-ykr1.onrender.com

    routes:
      - type: rewrite
        source: /*
        destination: /index.html